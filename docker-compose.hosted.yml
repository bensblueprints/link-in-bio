# Hosted (multi-tenant) LinkLeaf deploy — linkleaf.im on Coolify.
# The self-host single-tenant product still uses the plain docker-compose.yml
# (SQLite, no Postgres) — this file is only for the hosted SaaS.
# Bundling Postgres in its own container (rather than depending on a
# Coolify-managed resource) keeps the whole stack portable: `docker compose
# -f docker-compose.hosted.yml up -d` reproduces it anywhere.
services:
  app:
    build: .
    environment:
      - PORT=5307
      - APP_MODE=multi
      - DATA_DIR=/data
      - DATABASE_URL=postgresql://${DB_USER:-linkleaf}:${DB_PASSWORD:?set DB_PASSWORD in your .env file}@db:5432/${DB_NAME:-linkleaf}
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET in your .env file}
      - WHOP_API_KEY=${WHOP_API_KEY:-}
      - WHOP_WEBHOOK_SECRET=${WHOP_WEBHOOK_SECRET:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - PUBLIC_URL=${PUBLIC_URL:-https://linkleaf.im}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - FROM_EMAIL=${FROM_EMAIL:-LinkLeaf <no-reply@linkleaf.im>}
    volumes:
      - linkleaf-hosted-data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

      # HTTP -> HTTPS redirect
      - "traefik.http.routers.linkleaf-http.rule=Host(`linkleaf.im`) || Host(`www.linkleaf.im`)"
      - "traefik.http.routers.linkleaf-http.entrypoints=http"
      - "traefik.http.routers.linkleaf-http.middlewares=linkleaf-https-redirect"
      - "traefik.http.middlewares.linkleaf-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.linkleaf-https-redirect.redirectscheme.permanent=true"

      # www -> apex redirect
      - "traefik.http.routers.linkleaf-www.rule=Host(`www.linkleaf.im`)"
      - "traefik.http.routers.linkleaf-www.entrypoints=https"
      - "traefik.http.routers.linkleaf-www.tls=true"
      - "traefik.http.routers.linkleaf-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.linkleaf-www.middlewares=linkleaf-www-redirect"
      - "traefik.http.middlewares.linkleaf-www-redirect.redirectregex.regex=^https?://www\\.linkleaf\\.im/(.*)"
      - "traefik.http.middlewares.linkleaf-www-redirect.redirectregex.replacement=https://linkleaf.im/$${1}"
      - "traefik.http.middlewares.linkleaf-www-redirect.redirectregex.permanent=true"

      # Apex
      - "traefik.http.routers.linkleaf.rule=Host(`linkleaf.im`)"
      - "traefik.http.routers.linkleaf.entrypoints=https"
      - "traefik.http.routers.linkleaf.tls=true"
      - "traefik.http.routers.linkleaf.tls.certresolver=letsencrypt"
      - "traefik.http.routers.linkleaf.service=linkleaf-svc"
      - "traefik.http.services.linkleaf-svc.loadbalancer.server.port=5307"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-linkleaf}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in your .env file}
      POSTGRES_DB: ${DB_NAME:-linkleaf}
    volumes:
      - linkleaf-hosted-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-linkleaf}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  linkleaf-hosted-data:
  linkleaf-hosted-db:

networks:
  coolify:
    external: true
